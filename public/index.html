<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalable Image Upload System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            word-break: break-word;
        }

        img {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Scalable Image Upload System</h1>

    <input type="file" id="imageInput" accept="image/*">
    <br>

    <button onclick="uploadImage()">Upload Image</button>

    <div id="result"></div>
</div>

<script>
    async function uploadImage() {
        const fileInput = document.getElementById("imageInput");
        const resultDiv = document.getElementById("result");

        if (!fileInput.files[0]) {
            resultDiv.innerHTML = "<p>Please select an image</p>";
            return;
        }

        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        resultDiv.innerHTML = "Uploading...";

        try {
            const response = await fetch("/upload", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (data.imageUrl) {
                resultDiv.innerHTML = `
                    <p><strong>Upload Successful</strong></p>
                    <a href="${data.imageUrl}" target="_blank">View Uploaded Image</a>
                    <br>
                    <img src="${data.imageUrl}" alt="Uploaded Image">
                `;
            } else {
                resultDiv.innerHTML = `<p>${data.message}</p>`;
            }

        } catch (error) {
            resultDiv.innerHTML = "<p>Upload failed</p>";
        }
    }
</script>

</body>
</html>
